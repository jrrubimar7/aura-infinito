<script>
// Crea un objeto para almacenar los reportes cargados en caché
const reportesCaché = {};

// Función para cargar un reporte desde el servidor o desde el caché
function cargarReporte(idReporte) {
  if (reportesCaché[idReporte]) {
    // Si el reporte está en caché, devuelve el contenido de la caché
    return reportesCaché[idReporte];
  } else {
    // Si el reporte no está en caché, carga el contenido desde el servidor
    const respuesta = fetch(`/reportes/${idReporte}`);
    respuesta.then((response) => {
      response.text().then((contenido) => {
        reportesCaché[idReporte] = contenido;
        // Devuelve el contenido del reporte
        return contenido;
      });
    });
  }
}
