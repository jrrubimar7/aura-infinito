<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AURA FIX</title>
</head>
<body>

<div id="chat"></div>

<textarea id="inp" placeholder="Escribe..."></textarea>
<button onclick="send()">Enviar</button>

<script>
function addMsg(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.textContent = role + ": " + text;
  chat.appendChild(div);
}

function send(){
  try{
    const inp = document.getElementById('inp');
    if(!inp) return;

    const txt = inp.value.trim();
    if(!txt) return;

    inp.value = "";

    addMsg('user', txt);

    // Simulación de respuesta (puedes conectar API aquí)
    setTimeout(()=>{
      addMsg('aura', 'Respuesta simulada: ' + txt);
    }, 300);

  }catch(e){
    console.error(e);
  }
}
</script>

</body>
</html>
